<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1552346154-21d32810aba3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            color: #fff;
        }

        .glass-card h2 {
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 5px;
            color: rgba(255, 255, 255, 0.9);
        }

        .form-control {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 0;
            color: #fff;
            padding: 10px 0;
            transition: 0.3s;
        }

        .form-control:focus {
            background: transparent;
            box-shadow: none;
            border-bottom-color: #fff;
            color: #fff;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
        }


        .btn-login {
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background-color: rgba(170, 152, 152, 0.85);
            transform: translateY(-2px);
        }

        .auth-links {
            margin-top: 25px;
            font-size: 0.85rem;
        }

        .auth-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .form-check-input {
            background-color: transparent;
            border-color: rgba(255, 255, 255, 0.5);
        }

        .form-check-input:checked {
            background-color: #fff;
            border-color: #fff;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="glass-card text-center">
            <h2>Login</h2>
            
            <form action="#">
                <div class="mb-4 text-start">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>
                
                <div class="mb-4 text-start">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="Enter your password" required>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label small" for="remember">Remember Me</label>
                    </div>
                    <a href="#" class="small text-white fw-bold">Forget Password</a>
                </div>

               <a href>
                 <button type="submit" class="btn btn-login">Log in</button>
               </a>

                <div class="auth-links">
                    <span>Don't have an account? </span>
                    <a href="./register.html">Register</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
