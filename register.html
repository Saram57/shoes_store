<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1552346154-21d32810aba3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            color: #fff;
        }

        .glass-card h2 {
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0;
            color: rgba(255, 255, 255, 0.8);
        }

        .form-control {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 0;
            color: #fff;
            padding: 10px 0;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .form-control:focus {
            background: transparent;
            box-shadow: none;
            border-bottom-color: #fff;
            color: #fff;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
        }

        .btn-register {
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-register:hover {
            background-color: rgba(170, 152, 152, 0.85);
            transform: translateY(-2px);
        }

        .auth-links {
            margin-top: 25px;
            font-size: 0.85rem;
        }

        .auth-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .form-check-input {
            background-color: transparent;
            border-color: rgba(255, 255, 255, 0.5);
        }

        .form-check-input:checked {
            background-color: #fff;
            border-color: #fff;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="glass-card text-center">
            <h2>Register</h2>
            <p class="subtitle">Join our community</p>
            
            <form action="#">
                <div class="text-start">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="e.g. John Doe" required>
                </div>

                <div class="text-start">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="example@mail.com" required>
                </div>
                
                <div class="text-start">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="Create a password" required>
                </div>

                <div class="text-start">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" placeholder="Repeat your password" required>
                </div>

                <div class="form-check text-start mb-4">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label small" for="terms">
                        I agree to the <a href="#" class="text-white fw-bold">Terms & Conditions</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-register">Sign Up</button>

                <div class="auth-links">
                    <span>Already have an account? </span>
                    <a href="./loginpage.html">Login</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
