<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
           :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(12px);
            --glass-border: 1px solid rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --text-color: #fff;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                        url('https://images.unsplash.com/photo-1552346154-21d32810aba3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        .navbar-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: var(--glass-border);
            padding: 15px 0;
            z-index: 1030;
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.6rem;
            color: var(--text-color) !important;
            letter-spacing: 1px;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8) !important;
            font-weight: 400;
            font-size: 0.95rem;
            margin: 0 10px;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            color: #fff !important;
            opacity: 1;
        }

        .btn-login-nav {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.7);
            color: #fff;
            border-radius: 4px;
            padding: 7px 25px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-login-nav:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
        }


        .glass-panel {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; padding: 30px;
        }
        .cart-item {
            background: rgba(255, 255, 255, 0.05); border-radius: 10px;
            padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        .product-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; background: white;}
        .btn-qty { background: rgba(255,255,255,0.2); border: none; color: white; width: 30px; border-radius: 5px; }
        .checkout-btn { background: #332d29; color: white; border: none; width: 100%; padding: 15px; font-weight: bold; }
        .empty-state { text-align: center; padding: 50px 0; }

           
        .footer-glass {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px 0 20px;
            margin-top: 50px;
        }

        .footer-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .footer-heading {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer-link, .footer-text {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .footer-link:hover {
            color: #fff;
        }

        .social-icons a {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-right: 15px;
            transition: 0.3s;
        }

        .social-icons a:hover {
            color: #fff;
        }

        .copyright {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 40px;
            padding-top: 20px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark fixed-top navbar-glass">
        <div class="container">
            <a class="navbar-brand" href="#">Shoes store</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./product.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Cart</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a href="./loginpage.html" class="btn btn-login-nav">LOGIN</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
<div class="container py-5 mt-5">
    <div id="cart-content" class="row">
    </div>
</div>


<footer class="footer-glass">
        <div class="container">
            <div class="row gy-4">
                <div class="col-lg-4">
                    <div class="footer-logo">Shoes store</div>
                    <p class="footer-text pe-lg-5">Elegant footwear for every occasion. Handcrafted with care and designed for comfort.</p>
                </div>
                
                <div class="col-md-4 col-lg-4">
                    <h5 class="footer-heading">Contact</h5>
                    <a href="mailto:hello@shoes.com" class="footer-link">hello@shoes.com</a>
                    <p class="footer-text">+1 (555) 234-5678</p>
                    <p class="footer-text">123 Fashion Ave, New York</p>
                </div>

                <div class="col-md-4 col-lg-4">
                    <h5 class="footer-heading">Follow Us</h5>
                    <div class="social-icons">
                        <a href="#"><i class="bi bi-twitter-x"></i></a>
                        <a href="#"><i class="bi bi-instagram"></i></a>
                        <a href="#"><i class="bi bi-facebook"></i></a>
                    </div>
                </div>
            </div>
            
            <div class="text-center copyright">
                <p>© 2026 Shoes. All rights reserved.</p>
            </div>
        </div>
    </footer>
<script>
    function renderCart() {
        let cart = JSON.parse(localStorage.getItem('luna_cart')) || [];
        let container = document.getElementById('cart-content');
        
        if (cart.length === 0) {
            container.innerHTML = `
                <div class="col-12 glass-panel empty-state">
                    <h2 class="mb-4">Your Cart is Empty</h2>
                    <p class="mb-4">Looks like you haven't added anything yet.</p>
                    <a href="./product.html" class="btn btn-light px-5 py-3">BROWSE PRODUCTS</a>
                </div>`;
            return;
        }

        let subtotal = 0;
        let itemsHtml = cart.map((item, index) => {
            subtotal += item.price * item.quantity;
            return `
                <div class="cart-item d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center">
                        <img src="${item.image}" class="product-img me-3">
                        <div>
                            <h6 class="mb-0">${item.name}</h6>
                            <small class="text-white-50">$${item.price}</small>
                        </div>
                    </div>
                    <div class="d-flex align-items-center">
                        <button class="btn-qty" onclick="changeQty(${index}, -1)">-</button>
                        <span class="mx-3">${item.quantity}</span>
                        <button class="btn-qty" onclick="changeQty(${index}, 1)">+</button>
                        <span class="ms-4 fw-bold">$${(item.price * item.quantity).toFixed(2)}</span>
                        <button class="btn btn-link text-white-50 ms-3" onclick="removeItem(${index})">&times;</button>
                    </div>
                </div>`;
        }).join('');

        container.innerHTML = `
            <div class="col-lg-8">
                <div class="glass-panel">
                    <h4 class="mb-4">Shopping Cart</h4>
                    ${itemsHtml}
                </div>
            </div>
            <div class="col-lg-4">
                <div class="glass-panel">
                    <h4>Order Summary</h4>
                    <hr>
                    <div class="d-flex justify-content-between mb-2"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
                    <div class="d-flex justify-content-between mb-4"><span>Shipping</span><span class="text-success">Free</span></div>
                    <div class="d-flex justify-content-between fw-bold fs-4"><span>Total</span><span>$${subtotal.toFixed(2)}</span></div>
                    <button class="checkout-btn mt-4">CHECKOUT</button>
                </div>
            </div>`;
    }

    function changeQty(index, delta) {
        let cart = JSON.parse(localStorage.getItem('luna_cart'));
        cart[index].quantity += delta;
        if (cart[index].quantity < 1) cart.splice(index, 1);
        localStorage.setItem('luna_cart', JSON.stringify(cart));
        renderCart();
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('luna_cart'));
        cart.splice(index, 1);
        localStorage.setItem('luna_cart', JSON.stringify(cart));
        renderCart();
    }

    renderCart();
</script>
</body>
</html>
